services:
  bot:
    image: your-dockerhub-user/zalo-ai:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3070:3000"
      - "3069:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      # GPU mode
      VIENEU_GPU_ENABLED: ${VIENEU_GPU_ENABLED:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
    gpus: all

  tunnel:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - bot
